###############################################################################
# Pa_mSikA — Nginx Config (Production)
# Serves frontend static files + reverse-proxies /api/ → FastAPI
###############################################################################

upstream backend {
    server api:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options   "nosniff"                      always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection         "1; mode=block"                always;

    # ── Upload size limit (images up to 50 MB total per request) ──
    client_max_body_size 50M;

    # ── Compression ───────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;
    gzip_min_length 1024;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Uploaded product images — MUST come before static assets regex ──
    location /uploads/ {
        alias /app/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # ── API proxy → FastAPI ───────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Cookie forwarding for refresh-token HttpOnly cookie
        proxy_pass_header  Set-Cookie;
        proxy_cookie_path  /api/v1/auth /api/v1/auth;

        client_max_body_size   50M;
        proxy_connect_timeout  30s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    # ── Health check — no access log noise ───────────────────────
    location = /health {
        proxy_pass http://backend/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Service worker — never cache ──────────────────────────────
    location = /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        expires 0;
        try_files $uri =404;
    }

    # ── manifest.json — short cache ───────────────────────────────
    location = /manifest.json {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # ── Static assets — long cache (CSS, JS, images, fonts) ──────
    # Note: /uploads/ is excluded — handled by its own location block above
    location ~* ^(?!/uploads/).*\.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback — all routes → index.html ────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
